# ipfs-cluster chart values for e2e (single peer).
replicas: 1

# Single peer needs a cluster secret; bootstrap identity is created by ipfs-cluster-service init.
clusterSecret: "25c76e000fe0c37c4780f76b9b8e66454a1fef66f32bbed387d4e6c9f06dbf00"
bootstrapPeerId: ""
bootstrapPeerPrivKey: ""

storage:
  cluster:
    size: 1Gi
  ipfs:
    size: 5Gi

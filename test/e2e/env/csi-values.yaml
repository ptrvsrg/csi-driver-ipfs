# E2E values for csi-driver-ipfs. IPFS API from ipfs-cluster chart (first peer).
ipfsApi: "/dns4/ipfs-cluster-0.ipfs-cluster.ipfs.svc.cluster.local/tcp/5001"
ipfsMfsRoot: "/csi-volumes"

node:
  ipfsApi: "/dns4/ipfs-cluster-0.ipfs-cluster.ipfs.svc.cluster.local/tcp/5001"

storageClass:
  create: true
  name: ipfs-csi
  reclaimPolicy: Delete
  volumeBindingMode: Immediate

image:
  driver:
    repository: ghcr.io/ptrvsrg/csi-driver-ipfs
    tag: latest
    pullPolicy: IfNotPresent

externalSnapshotter:
  enabled: false
  customResourceDefinitions:
    enabled: false

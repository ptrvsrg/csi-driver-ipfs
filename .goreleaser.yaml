version: 2

project_name: csi-driver-ipfs

# Git tags are `driver/v*`; binaries and OCI tags use semver without the `driver/` prefix.
# .IsSnapshot keeps GoReleaser snapshot .Version; tagged releases use trimprefix on .Tag.
before:
  hooks:
    - go mod download

builds:
  - id: csi-driver-ipfs
    main: ./cmd/csi-driver-ipfs
    binary: csi-driver-ipfs
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.driverVersion={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}
      - -X main.gitCommit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm64
        goarm: 7

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: '{{ .ProjectName }}_{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc

dockers:
  - image_templates:
      - 'ghcr.io/ptrvsrg/csi-driver-ipfs:{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}-amd64'
      - "ghcr.io/ptrvsrg/csi-driver-ipfs:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - '--build-arg=VERSION={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}'
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_DATE={{ .Date }}"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=csi-driver-ipfs"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - '--label=org.opencontainers.image.version={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}'
    goos: linux
    goarch: amd64
  - image_templates:
      - 'ghcr.io/ptrvsrg/csi-driver-ipfs:{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}-arm64'
      - "ghcr.io/ptrvsrg/csi-driver-ipfs:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - '--build-arg=VERSION={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}'
      - "--build-arg=GIT_COMMIT={{ .FullCommit }}"
      - "--build-arg=BUILD_DATE={{ .Date }}"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=csi-driver-ipfs"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - '--label=org.opencontainers.image.version={{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}'
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: 'ghcr.io/ptrvsrg/csi-driver-ipfs:{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}'
    image_templates:
      - 'ghcr.io/ptrvsrg/csi-driver-ipfs:{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}-amd64'
      - 'ghcr.io/ptrvsrg/csi-driver-ipfs:{{ if .IsSnapshot }}{{ .Version }}{{ else }}{{ trimprefix .Tag "driver/" }}{{ end }}-arm64'
  - name_template: "ghcr.io/ptrvsrg/csi-driver-ipfs:latest"
    image_templates:
      - "ghcr.io/ptrvsrg/csi-driver-ipfs:latest-amd64"
      - "ghcr.io/ptrvsrg/csi-driver-ipfs:latest-arm64"

release:
  github:
    owner: ptrvsrg
    name: csi-driver-ipfs
  draft: false
  mode: replace

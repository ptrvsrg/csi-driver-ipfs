version: 2

project_name: csi-driver-ipfs

# Helm chart tags (chart/*) must not become "previous" for driver releases.
# Each entry is passed to `git describe --exclude=...` (fnmatch). GoReleaser Pro
# offers ignore_tag_prefixes instead; add more rows here if new tag namespaces appear.
git:
  ignore_tags:
    - chart/*

# Git tags are driver/v*; CI sets GORELEASER_CURRENT_TAG=v… so semver and {{ .Version }} work.
before:
  hooks:
    - go mod download

builds:
  - id: csi-driver-ipfs
    main: ./cmd/csi-driver-ipfs
    binary: csi-driver-ipfs
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.driverVersion={{.Version}}
      - -X main.gitCommit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: arm64
        goarm: 7

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: '{{ incpatch (trimprefix .Tag "driver/") }}-next'

changelog:
  sort: asc

dockers_v2:
  - id: csi-driver-ipfs
    dockerfile: Dockerfile
    ids:
      - csi-driver-ipfs
    images:
      - ghcr.io/ptrvsrg/csi-driver-ipfs
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: csi-driver-ipfs
      org.opencontainers.image.description: CSI driver for IPFS volumes
      org.opencontainers.image.source: https://github.com/ptrvsrg/csi-driver-ipfs
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
    build_args:
      VERSION: "{{ .Version }}"
      GIT_COMMIT: "{{ .FullCommit }}"
      BUILD_DATE: "{{ .Date }}"
    extra_files:
      - go.mod
      - go.sum
      - cmd/
      - pkg/

release:
  github:
    owner: ptrvsrg
    name: csi-driver-ipfs
  draft: false
  mode: replace

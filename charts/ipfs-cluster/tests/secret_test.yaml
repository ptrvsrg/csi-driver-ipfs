# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: cluster Secret
templates:
  - secret.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should create Secret when clusterSecret is set
    set:
      clusterSecret: "0123456789abcdef0123456789abcdef"
      existingSecret: ""
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

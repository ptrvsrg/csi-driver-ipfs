# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: ipfs-cluster StatefulSet
templates:
  - statefulset.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should render StatefulSet with replicas from values
    set:
      replicas: 2
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 2
      - matchRegex:
          path: metadata.name
          pattern: test-release-ipfs-cluster$
  - it: should keep Kubo capabilities required by the image entrypoint
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.add
          content: CHOWN
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: CHOWN
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: SETGID
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: SETUID
  - it: should run IPFS probes as the ipfs user
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.exec.command
          value:
            - /sbin/gosu
            - ipfs
            - ipfs
            - id
            - --offline
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.exec.command
          value:
            - /sbin/gosu
            - ipfs
            - ipfs
            - id
            - --offline

# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: ipfs-cluster StatefulSet
templates:
  - statefulset.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should render StatefulSet with replicas from values
    set:
      replicas: 2
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 2
      - matchRegex:
          path: metadata.name
          pattern: test-release-ipfs-cluster$

# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: CSIDriver
templates:
  - csi-ipfs-driverinfo.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should register CSIDriver
    asserts:
      - isKind:
          of: CSIDriver
      - equal:
          path: metadata.name
          value: ipfs.csi.ptrvsrg.github.io

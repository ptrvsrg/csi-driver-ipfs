# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: csi-ipfs-node DaemonSet
templates:
  - csi-ipfs-node.yaml
release:
  name: test-release
  namespace: default
tests:
  - it: should render DaemonSet for node plugin
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: csi-ipfs-node
      - equal:
          path: spec.selector.matchLabels.app
          value: csi-ipfs-node
  - it: should mount kubelet plugins directory for staging paths
    asserts:
      - equal:
          path: spec.template.spec.containers[2].volumeMounts[2].name
          value: plugins-dir
      - equal:
          path: spec.template.spec.containers[2].volumeMounts[2].mountPath
          value: /var/lib/kubelet/plugins
      - equal:
          path: spec.template.spec.volumes[2].name
          value: plugins-dir
      - equal:
          path: spec.template.spec.volumes[2].hostPath.path
          value: /var/lib/kubelet/plugins

---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  name: {{ .Values.node.name }}
  namespace: {{ .Release.Namespace }}
{{ include "csi-driver-ipfs.labels" . | indent 2 }}
spec:
  updateStrategy:
    rollingUpdate:
      maxUnavailable: {{ .Values.node.maxUnavailable }}
    type: RollingUpdate
  selector:
    matchLabels:
      app: {{ .Values.node.name }}
  template:
    metadata:
{{ include "csi-driver-ipfs.labels" . | indent 6 }}
        app: {{ .Values.node.name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      hostNetwork: true # original ipfs connection would be broken without hostNetwork setting
      dnsPolicy: {{ .Values.node.dnsPolicy }}
      serviceAccountName: {{ .Values.serviceAccount.node }}
      priorityClassName: {{ .Values.node.priorityClassName }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
{{- with .Values.node.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
      nodeSelector:
        kubernetes.io/os: linux
{{- with .Values.node.nodeSelector }}
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.node.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: liveness-probe
{{- if hasPrefix "/" .Values.image.livenessProbe.repository }}
          image: "{{ .Values.image.baseRepo }}{{ .Values.image.livenessProbe.repository }}:{{ .Values.image.livenessProbe.tag }}"
{{- else }}
          image: "{{ .Values.image.livenessProbe.repository }}:{{ .Values.image.livenessProbe.tag }}"
{{- end }}
          args:
            - --csi-address=/csi/csi.sock
            - --probe-timeout=3s
            - --http-endpoint=:{{ .Values.node.livenessProbe.healthPort }}
            - --v=2
          imagePullPolicy: {{ .Values.image.livenessProbe.pullPolicy }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          resources: {{- toYaml .Values.node.resources.livenessProbe | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
        - name: node-driver-registrar
{{- if hasPrefix "/" .Values.image.nodeDriverRegistrar.repository }}
          image: "{{ .Values.image.baseRepo }}{{ .Values.image.nodeDriverRegistrar.repository }}:{{ .Values.image.nodeDriverRegistrar.tag }}"
{{- else }}
          image: "{{ .Values.image.nodeDriverRegistrar.repository }}:{{ .Values.image.nodeDriverRegistrar.tag }}"
{{- end }}
          args:
            - --v=2
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
{{- if .Values.nodeDriverRegistrar.livenessProbe.enabled }}
            - --http-endpoint=:{{ .Values.nodeDriverRegistrar.healthPort }}
{{- end }}
          env:
            - name: DRIVER_REG_SOCK_PATH
              value: {{ .Values.kubeletDir }}/plugins/csi-ipfsplugin/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          imagePullPolicy: {{ .Values.image.nodeDriverRegistrar.pullPolicy }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
{{- if .Values.nodeDriverRegistrar.livenessProbe.enabled }}
          ports:
            - name: healthz
              containerPort: {{ .Values.nodeDriverRegistrar.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: healthz
            timeoutSeconds: {{ .Values.nodeDriverRegistrar.startupProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.nodeDriverRegistrar.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.nodeDriverRegistrar.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.nodeDriverRegistrar.livenessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.nodeDriverRegistrar.livenessProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.nodeDriverRegistrar.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.nodeDriverRegistrar.livenessProbe.failureThreshold }}
{{- end }}
          resources: {{- toYaml .Values.node.resources.nodeDriverRegistrar | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
              - ALL
        - name: node
          image: "{{ .Values.image.driver.repository }}:{{ .Values.image.driver.tag }}"
          imagePullPolicy: {{ .Values.image.driver.pullPolicy }}
          securityContext:
            privileged: true
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              add:
              - SYS_ADMIN
              drop:
              - ALL
            allowPrivilegeEscalation: true
          args:
            - "--endpoint=$(CSI_ENDPOINT)"
            - "--nodeid=$(NODE_ID)"
            - "--drivername={{ .Values.driver.name }}"
            - "--ipfs-api=$(IPFS_API)"
            - "--ipfs-mfs-root={{ .Values.ipfsMfsRoot }}"
            - "--mount-dir=/var/lib/csi-ipfs"
            - "--log-level={{ .Values.node.logLevel }}"
            - "--log-format=json"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: IPFS_API
              value: {{ .Values.node.ipfsApi | default .Values.ipfsApi | quote }}
          # livenessprobe HTTP does not listen until CSI socket exists (upstream behavior).
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.node.livenessProbe.healthPort | int }}
            timeoutSeconds: {{ .Values.node.startupProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.node.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.node.startupProbe.failureThreshold }}
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: {{ .Values.node.livenessProbe.healthPort | int }}
            initialDelaySeconds: 0
            timeoutSeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: mount-dir
              mountPath: /var/lib/csi-ipfs
            - name: plugins-dir
              mountPath: {{ .Values.kubeletDir }}/plugins
            - name: pods-mount-dir
              mountPath: {{ .Values.kubeletDir }}/pods
              mountPropagation: "Bidirectional"
            {{- if .Values.feature.propagateHostMountOptions }}
            - name: host-ipfsmount-conf
              mountPath: /etc/ipfsmount.conf
            - name: host-ipfsmount-conf-d
              mountPath: /etc/ipfsmount.conf.d
            {{- end }}
          resources: {{- toYaml .Values.node.resources.ipfs | nindent 12 }}
      volumes:
        - name: socket-dir
          hostPath:
            path: {{ .Values.kubeletDir }}/plugins/csi-ipfsplugin
            type: DirectoryOrCreate
        - name: mount-dir
          emptyDir: {}
        - name: plugins-dir
          hostPath:
            path: {{ .Values.kubeletDir }}/plugins
            type: Directory
        - name: pods-mount-dir
          hostPath:
            path: {{ .Values.kubeletDir }}/pods
            type: Directory
        - hostPath:
            path: {{ .Values.kubeletDir }}/plugins_registry
            type: Directory
          name: registration-dir
        {{- if .Values.feature.propagateHostMountOptions }}
        - hostPath:
            path: /etc/ipfsmount.conf
            type: FileOrCreate
          name: host-ipfsmount-conf
        - hostPath:
            path: /etc/ipfsmount.conf.d
            type: DirectoryOrCreate
          name: host-ipfsmount-conf-d
        {{- end }}

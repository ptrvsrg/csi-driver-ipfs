---
apiVersion: v1
kind: Namespace
metadata:
  name: ipfs
---
# Source: ipfs-cluster/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: demo-ipfs-cluster-secret
  namespace: ipfs
  labels:
    helm.sh/chart: ipfs-cluster-0.1.0
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
type: Opaque
data:
  cluster-secret: "UkVQTEFDRV9NRQ=="
---
# Source: ipfs-cluster/templates/configmap-scripts.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-ipfs-cluster-scripts
  namespace: ipfs
  labels:
    helm.sh/chart: ipfs-cluster-0.1.0
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e
    if [ ! -f /data/ipfs-cluster/service.json ]; then
      ipfs-cluster-service init
    fi
    PEER_HOSTNAME=$(cat /proc/sys/kernel/hostname)
    if echo "$PEER_HOSTNAME" | grep -q "ipfs-cluster-0"; then
      if [ -n "${BOOTSTRAP_PEER_PRIV_KEY}" ]; then
        CLUSTER_ID="${BOOTSTRAP_PEER_ID}" \
        CLUSTER_PRIVATEKEY="${BOOTSTRAP_PEER_PRIV_KEY}" \
        exec ipfs-cluster-service daemon --upgrade
      else
        exec ipfs-cluster-service daemon --upgrade
      fi
    else
      BOOTSTRAP_ADDR="/dns4/demo-ipfs-cluster-0.demo-ipfs-cluster.ipfs.svc.cluster.local/tcp/9096/ipfs/${BOOTSTRAP_PEER_ID}"
      exec ipfs-cluster-service daemon --upgrade --bootstrap "$BOOTSTRAP_ADDR" --leave
    fi
  bootstrap-peer-id: ""
  configure-ipfs.sh: |
    #!/bin/sh
    set -e
    mkdir -p /data/ipfs
    if [ -f /data/ipfs/config ]; then
      if [ -f /data/ipfs/repo.lock ]; then
        rm -f /data/ipfs/repo.lock
      fi
      chown -R 1000:1000 /data/ipfs 2>/dev/null || true
      exit 0
    fi
    ipfs init --profile=flatfs,server
    ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
    ipfs config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
    ipfs config --json Swarm.ConnMgr.HighWater 2000
    ipfs config --json Datastore.BloomFilterSize 1048576
    ipfs config Datastore.StorageMax 100GB
    chown -R 1000:1000 /data/ipfs 2>/dev/null || true
---
# Source: ipfs-cluster/templates/service.yaml
# Headless service for StatefulSet pod DNS (ipfs-cluster-0.ipfs-cluster.ns.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: demo-ipfs-cluster
  namespace: ipfs
  labels:
    helm.sh/chart: ipfs-cluster-0.1.0
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: api-http
      port: 9094
      targetPort: api-http
      protocol: TCP
    - name: proxy-http
      port: 9095
      targetPort: proxy-http
      protocol: TCP
    - name: cluster-swarm
      port: 9096
      targetPort: cluster-swarm
      protocol: TCP
    - name: ipfs-api
      port: 5001
      targetPort: api
      protocol: TCP
    - name: ipfs-gateway
      port: 8080
      targetPort: gateway
      protocol: TCP
    - name: ipfs-swarm
      port: 4001
      targetPort: swarm
      protocol: TCP
  selector:
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
---
# Source: ipfs-cluster/templates/service.yaml
# Optional: ClusterIP service for API access (e.g. from CSI driver or clients)
apiVersion: v1
kind: Service
metadata:
  name: demo-ipfs-cluster-api
  namespace: ipfs
  labels:
    helm.sh/chart: ipfs-cluster-0.1.0
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: api-http
      port: 9094
      targetPort: api-http
      protocol: TCP
    - name: proxy-http
      port: 9095
      targetPort: proxy-http
      protocol: TCP
  selector:
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
---
# Source: ipfs-cluster/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-ipfs-cluster
  namespace: ipfs
  labels:
    helm.sh/chart: ipfs-cluster-0.1.0
    app.kubernetes.io/name: ipfs-cluster
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: demo-ipfs-cluster
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs-cluster
      app.kubernetes.io/instance: demo
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        helm.sh/chart: ipfs-cluster-0.1.0
        app.kubernetes.io/name: ipfs-cluster
        app.kubernetes.io/instance: demo
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: cluster
    spec:
      initContainers:
        - name: configure-ipfs
          image: "ipfs/kubo:v0.39.0"
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/configure-ipfs.sh"]
          volumeMounts:
            - name: ipfs-storage
              mountPath: /data/ipfs
            - name: scripts
              mountPath: /scripts
      containers:
        - name: ipfs
          image: "ipfs/kubo:v0.39.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: IPFS_FD_MAX
              value: "4096"
          ports:
            - name: swarm
              containerPort: 4001
              protocol: TCP
            - name: api
              containerPort: 5001
              protocol: TCP
            - name: gateway
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            exec:
              command: ["ipfs", "id", "--offline"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["ipfs", "id", "--offline"]
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: ipfs-storage
              mountPath: /data/ipfs
          resources:
            {}
        - name: ipfs-cluster
          image: "ipfs/ipfs-cluster:v1.1.5"
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/entrypoint.sh"]
          env:
            - name: BOOTSTRAP_PEER_ID
              valueFrom:
                configMapKeyRef:
                  name: demo-ipfs-cluster-scripts
                  key: bootstrap-peer-id
            - name: BOOTSTRAP_PEER_PRIV_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-ipfs-cluster-secret
                  key: bootstrap-peer-priv-key
                  optional: true
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: demo-ipfs-cluster-secret
                  key: cluster-secret
            - name: CLUSTER_SVC_NAME
              value: demo-ipfs-cluster
          ports:
            - name: api-http
              containerPort: 9094
              protocol: TCP
            - name: proxy-http
              containerPort: 9095
              protocol: TCP
            - name: cluster-swarm
              containerPort: 9096
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: cluster-swarm
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: cluster-storage
              mountPath: /data/ipfs-cluster
            - name: scripts
              mountPath: /scripts
          resources:
            {}
      volumes:
        - name: scripts
          configMap:
            name: demo-ipfs-cluster-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: cluster-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: ipfs-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - lll
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
  disable:
    - exhaustruct  # often too strict for proto-generated structs
  settings:
    lll:
      line-length: 120
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      disable:
        - fieldalignment
        - shadow
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - lll
      - path: .*\.pb\.go
        linters:
          - all

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

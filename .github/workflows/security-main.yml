name: Security scans (main)

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "24.14.0"
  HELM_VERSION: v4.1.4
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_VERSION: v0.69.3

jobs:
  golang-code-scan:
    name: golang-code-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go mod download
        run: go mod download

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  golang-deps-scan:
    name: golang-deps-scan
    needs:
      - golang-code-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Go dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --skip-dirs docs .

  docs-deps-scan:
    name: docs-deps-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on docs dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 docs

  helm-scan:
    name: helm-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Helm charts - ${{ matrix.chart }}
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/${{ matrix.chart }}"

  kubernetes-manifests-scan:
    name: kubernetes-manifests-scan
    needs:
      - helm-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on rendered Kubernetes manifests - ${{ matrix.chart }}
        run: |
          set -euo pipefail
          mkdir -p charts/dist
          helm dependency update "charts/${{ matrix.chart }}"
          helm template "${{ matrix.chart }}" "charts/${{ matrix.chart }}" > "charts/dist/${{ matrix.chart }}-rendered.yaml"
          trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/dist/${{ matrix.chart }}-rendered.yaml"

  dockerfile-scan:
    name: dockerfile-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Dockerfile
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 Dockerfile

  wait-image:
    name: wait-image
    runs-on: ubuntu-latest
    timeout-minutes: 32
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CSI driver image on GHCR (up to 30 min, every 10s)
        run: |
          set -euo pipefail
          image='ghcr.io/ptrvsrg/csi-driver-ipfs:main-${{ github.sha }}'
          timeout_secs=1800
          start_ts=$(date +%s)
          while true; do
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              elapsed=$(( $(date +%s) - start_ts ))
              echo "OK: manifest present — ${image} (after ${elapsed}s)"
              exit 0
            fi
            elapsed=$(( $(date +%s) - start_ts ))
            if (( elapsed >= timeout_secs )); then
              break
            fi
            echo "Image not ready yet (${elapsed}s / ${timeout_secs}s), retry in 10s…"
            sleep 10
          done
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            elapsed=$(( $(date +%s) - start_ts ))
            echo "OK: manifest present — ${image} (after ${elapsed}s)"
            exit 0
          fi
          echo "::error title=E2E image missing::No manifest for ${image} within 30 minutes. Run or wait for CI DEV (Go) docker-build-push for this PR merge SHA, then re-add the e2e label."
          exit 1

  docker-image-scan:
    name: docker-image-scan
    needs:
      - dockerfile-scan
      - wait-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Build and scan Docker image
        run: |
          trivy image --quiet --severity "${{ env.TRIVY_SEVERITY }}" --ignorefile .trivyignore.image.yaml --exit-code 1 "ghcr.io/ptrvsrg/csi-driver-ipfs:main-${{ github.sha }}"

  shell-scripts-scan:
    name: shell-scripts-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            echo "No tracked shell scripts found."
            exit 0
          fi
          shellcheck -x "${shell_scripts[@]}"

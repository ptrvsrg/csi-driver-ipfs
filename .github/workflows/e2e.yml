name: E2E tests

on:
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to test, e.g. dev-<sha> or main-<sha>"
        required: true
        type: string

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write

env:
  HELM_VERSION: v4.1.4
  KUBECTL_VERSION: v1.35.0
  KIND_VERSION: v0.31.0
  GINKGO_VERSION: v2.31.0
  EXTERNAL_SNAPSHOTTER_VERSION: v8.5.0
  GHCR_IMAGE: ghcr.io/ptrvsrg/csi-driver-ipfs

jobs:
  context:
    name: context
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.ctx.outputs.run_e2e }}
      is_pr_mode: ${{ steps.ctx.outputs.is_pr_mode }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
      image_ref: ${{ steps.ctx.outputs.image_ref }}
      should_manage_labels: ${{ steps.ctx.outputs.should_manage_labels }}
      should_remove_run_label: ${{ steps.ctx.outputs.should_remove_run_label }}
    steps:
      - name: Resolve execution context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABEL: ${{ github.event.label.name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          set -euo pipefail

          run_e2e=false
          is_pr_mode=false
          pr_number=
          image_tag=
          image_ref=
          should_manage_labels=false
          should_remove_run_label=false

          case "${EVENT_NAME}" in
            pull_request)
              if [ "${PR_LABEL:-}" = "e2e/run" ]; then
                run_e2e=true
                is_pr_mode=true
                pr_number="${PR_NUMBER:-}"
                image_tag="dev-${GITHUB_SHA}"
                image_ref="${GHCR_IMAGE}:${image_tag}"
                should_manage_labels=true
                should_remove_run_label=true
              fi
              ;;
            workflow_dispatch)
              run_e2e=true
              image_tag="${INPUT_IMAGE_TAG}"
              image_ref="${GHCR_IMAGE}:${image_tag}"
              ;;
            *)
              echo "::error::Unsupported event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          {
            echo "run_e2e=${run_e2e}"
            echo "is_pr_mode=${is_pr_mode}"
            echo "pr_number=${pr_number}"
            echo "image_tag=${image_tag}"
            echo "image_ref=${image_ref}"
            echo "should_manage_labels=${should_manage_labels}"
            echo "should_remove_run_label=${should_remove_run_label}"
          } >> "$GITHUB_OUTPUT"

  prepare:
    name: prepare
    needs:
      - context
    if: needs.context.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post workflow run comment
        if: needs.context.outputs.is_pr_mode == 'true'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `E2E workflow has been started.\n\nWorkflow run: ${runUrl}`,
            });

      - name: Remove e2e/run label
        if: needs.context.outputs.should_remove_run_label == 'true'
        uses: mondeja/remove-labels-gh-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: e2e/run

  wait-image:
    name: wait-image
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 32
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CSI driver image on GHCR
        env:
          IMAGE_REF: ${{ needs.context.outputs.image_ref }}
        run: |
          set -euo pipefail
          image="${IMAGE_REF}"
          timeout_secs=1800
          start_ts=$(date +%s)

          while true; do
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              elapsed=$(( $(date +%s) - start_ts ))
              echo "OK: manifest present — ${image} (after ${elapsed}s)"
              exit 0
            fi

            elapsed=$(( $(date +%s) - start_ts ))
            if (( elapsed >= timeout_secs )); then
              break
            fi

            echo "Image not ready yet (${elapsed}s / ${timeout_secs}s), retry in 10s..."
            sleep 10
          done

          if docker manifest inspect "$image" >/dev/null 2>&1; then
            elapsed=$(( $(date +%s) - start_ts ))
            echo "OK: manifest present — ${image} (after ${elapsed}s)"
            exit 0
          fi

          echo "::error title=E2E image missing::No manifest for ${image} within 30 minutes."
          exit 1

  e2e:
    name: e2e
    needs:
      - context
      - wait-image
    if: needs.context.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Kind + kubectl (hosted tool cache)
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/kind
          key: ${{ runner.os }}-kind-tool-${{ runner.arch }}-${{ env.KIND_VERSION }}-${{ env.KUBECTL_VERSION }}

      - name: Cache Helm CLI
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/helm
          key: ${{ runner.os }}-helm-cli-${{ runner.arch }}-${{ env.HELM_VERSION }}

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Kind
        uses: helm/kind-action@v1
        with:
          version: ${{ env.KIND_VERSION }}
          kubectl_version: ${{ env.KUBECTL_VERSION }}
          install_only: true

      - name: Set up Ginkgo
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@${{ env.GINKGO_VERSION }}

      - name: Create k8s cluster
        working-directory: test/e2e
        run: |
          kind create cluster --name csi-ipfs-e2e --config env/kind-config.yaml
          kubectl --context kind-csi-ipfs-e2e wait --for=condition=Ready nodes --all --timeout=120s

      - name: Install Snapshot CRDs
        run: |
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotclasses.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotcontents.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshots.yaml

      - name: Deploy Snapshot Controller
        run: |
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml
          kubectl --context kind-csi-ipfs-e2e apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{ env.EXTERNAL_SNAPSHOTTER_VERSION }}/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml
          kubectl --context kind-csi-ipfs-e2e rollout status deployment/snapshot-controller -n kube-system --timeout=180s

      - name: Deploy IPFS cluster
        run: |
          kubectl create ns ipfs 2>/dev/null || true
          helm upgrade --install ipfs-cluster charts/ipfs-cluster -f test/e2e/env/ipfs-values.yaml -n ipfs --wait --timeout=600s
          kubectl --context kind-csi-ipfs-e2e wait --for=condition=ready pod -l app.kubernetes.io/name=ipfs-cluster -n ipfs --timeout=120s

      - name: Load CSI Driver image
        run: |
          docker image pull "${{ needs.context.outputs.image_ref }}"
          docker image tag "${{ needs.context.outputs.image_ref }}" "${{ env.GHCR_IMAGE }}:latest"
          kind load docker-image "${{ env.GHCR_IMAGE }}:latest" --name csi-ipfs-e2e

      - name: Deploy CSI IPFS
        run: |
          kubectl create ns csi-ipfs 2>/dev/null || true
          helm upgrade --install csi-driver-ipfs charts/csi-driver-ipfs -f test/e2e/env/csi-values.yaml -n csi-ipfs --wait --timeout=600s
          kubectl --context kind-csi-ipfs-e2e wait --for=condition=ready pod -l app=csi-ipfs-controller -n csi-ipfs --timeout=120s
          kubectl --context kind-csi-ipfs-e2e wait --for=condition=ready pod -l app=csi-ipfs-node -n csi-ipfs --timeout=120s

      - name: Run tests
        env:
          E2E_RUN: "1"
        working-directory: test/e2e
        run: |
          ginkgo -v -r --keep-going --timeout=30m ./suites/...

      - name: Cleanup Kind cluster
        if: always()
        working-directory: test/e2e
        run: |
          kind delete cluster --name csi-ipfs-e2e 2>/dev/null || true

  e2e-label-result:
    name: e2e-label-result
    needs:
      - context
      - prepare
      - wait-image
      - e2e
    if: ${{ always() && needs.context.outputs.should_manage_labels == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Apply e2e/success (remove e2e/fail)
        if: >-
          needs.prepare.result == 'success' &&
          needs.wait-image.result == 'success' &&
          needs.e2e.result == 'success'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr,
                name: 'e2e/fail',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr,
              labels: ['e2e/success'],
            });

      - name: Apply e2e/fail (remove e2e/success)
        if: >-
          needs.prepare.result == 'failure' ||
          needs.prepare.result == 'cancelled' ||
          needs.wait-image.result == 'failure' ||
          needs.wait-image.result == 'cancelled' ||
          needs.e2e.result == 'failure' ||
          needs.e2e.result == 'cancelled'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr,
                name: 'e2e/success',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr,
              labels: ['e2e/fail'],
            });

name: CI DEV (markdown)

# Path filters: GitHub Actions glob patterns (minimatch), not regex.
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpull_request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.markdownlint.json'
      - '.github/workflows/ci-dev-markdown.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: 'Docs: markdownlint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

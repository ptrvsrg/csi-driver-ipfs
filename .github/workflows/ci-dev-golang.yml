name: CI DEV (Go/Docker)

# Path filters: GitHub Actions glob patterns (minimatch), not regex.
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpull_request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - '.dockerignore'
      - '.golangci.yaml'
      - 'hack/**'
      - '.goreleaser.yaml'
      - '.github/workflows/ci-dev-golang.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GOLANGCI_LINT_VERSION: v2.10.1
  GORELEASER_VERSION: v2.15.0
  KUBO_VERSION: 0.41.0
  GHCR_IMAGE: ghcr.io/ptrvsrg/csi-driver-ipfs

jobs:
  mod-verify:
    name: 'Go: mod verify'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go mod verify
        run: go mod verify

  go-fmt:
    name: 'Go: formatting'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go fmt
        run: go fmt ./...

  go-vet:
    name: 'Go: static analysis'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go vet
        run: go vet ./...

  check-license:
    name: 'Go: check license header'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate license headers
        run: ./hack/validate-license-header.sh

  goreleaser-check:
    name: 'Go: goreleaser check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install GoReleaser
        run: go install "github.com/goreleaser/goreleaser/v2@${{ env.GORELEASER_VERSION }}"

      - name: goreleaser check
        run: goreleaser check

  lint:
    name: 'Go: lint'
    runs-on: ubuntu-latest
    needs:
      - mod-verify
      - go-fmt
      - go-vet
      - check-license
      - goreleaser-check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go mod download
        run: go mod download

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true
          verify: true

      - name: Lint
        run: golangci-lint run --timeout 10m

  unit:
    name: 'Go: unit tests'
    runs-on: ubuntu-latest
    needs:
      - mod-verify
      - go-fmt
      - go-vet
      - check-license
      - goreleaser-check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Unit tests
        run: go test -v -count=1 ./...

  build:
    name: 'Go: build'
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build binary (sanity)
        run: |
          set -euo pipefail
          mkdir -p bin
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CGO_ENABLED=0 go build \
            -ldflags "-s -w -X main.driverVersion=${VERSION} -X main.gitCommit=${GIT_COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o bin/csi-driver-ipfs \
            ./cmd/csi-driver-ipfs/

  docker-build-push:
    name: 'Docker: buildx and push to ghcr.io'
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build timestamp
        id: ts
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ipfs dev tags
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: 3p/ipfs/kubo
          file: Dockerfile
          push: true
          build-args: |
            KUBO_VERSION=${{ KUBO_VERSION }}
          tags: |
            ${{ env.GHCR_IMAGE }}/ipfs/kubo:${{ KUBO_VERSION }}-dev-pr-${{ github.event.number }}
            ${{ env.GHCR_IMAGE }}/ipfs/kubo:${{ KUBO_VERSION }}-dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push driver dev tags
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.ts.outputs.date }}
            KUBO_VERSION=${{ KUBO_VERSION }}-dev-${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:dev-pr-${{ github.event.number }}
            ${{ env.GHCR_IMAGE }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

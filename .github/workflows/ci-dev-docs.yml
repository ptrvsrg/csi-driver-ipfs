name: CI DEV (docs site)

# Path filters use GitHub Actions glob patterns (minimatch), not regex.
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpull_request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - 'docs/**'
      - '.github/workflows/ci-dev-docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  YARN_VERSION: "4.16.0"

jobs:
  build:
    name: 'Docs: docusaurus build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Docusaurus incremental (.docusaurus)
        uses: actions/cache@v5
        with:
          path: docs/.docusaurus
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('docs/yarn.lock', 'docs/package.json', 'docs/docusaurus.config.js', 'docs/sidebars.js') }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: Install dependencies
        run: yarn --cwd docs install --immutable

      - name: Build docs
        run: yarn --cwd docs run build

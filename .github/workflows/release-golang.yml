name: Release (Golang)

on:
  push:
    tags:
      - 'driver/v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OSS GoReleaser needs a semver git tag on $GITHUB_SHA; remote only has driver/v*.
      # Set GORELEASER_CURRENT_TAG and add a local-only tag (not pushed) on this commit.
      # https://goreleaser.com/cookbooks/set-a-custom-git-tag/
      - name: Semver tag for GoReleaser (local + GORELEASER_CURRENT_TAG)
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          case "$ref" in
            driver/v*)
              sem="${ref#driver/}"
              echo "GORELEASER_CURRENT_TAG=${sem}" >> "$GITHUB_ENV"
              git tag -f "${sem}" "$GITHUB_SHA"
              echo "GoReleaser: GORELEASER_CURRENT_TAG=${sem}, local tag -> ${GITHUB_SHA}"
              ;;
            *)
              echo "::error::Release workflow expected tag driver/v*, got: ${ref}" >&2
              exit 1
              ;;
          esac

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

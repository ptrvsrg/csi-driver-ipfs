name: Security scans

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to scan, e.g. main-<sha> or dev-<sha>"
        required: true
        type: string

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number ||
      github.ref ||
      github.run_id
    }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  packages: read

env:
  NODE_VERSION: "24.14.0"
  HELM_VERSION: v4.1.4
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_VERSION: v0.69.3
  GHCR_IMAGE: ghcr.io/ptrvsrg/csi-driver-ipfs

jobs:
  context:
    name: "Prepare: resolve context"
    runs-on: ubuntu-latest
    outputs:
      run_scans: ${{ steps.ctx.outputs.run_scans }}
      is_pr_mode: ${{ steps.ctx.outputs.is_pr_mode }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      image_tag: ${{ steps.ctx.outputs.image_tag }}
      image_ref: ${{ steps.ctx.outputs.image_ref }}
      should_manage_labels: ${{ steps.ctx.outputs.should_manage_labels }}
      should_remove_run_label: ${{ steps.ctx.outputs.should_remove_run_label }}
    steps:
      - name: Resolve execution context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABEL: ${{ github.event.label.name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
        run: |
          set -euo pipefail

          run_scans=false
          is_pr_mode=false
          pr_number=
          image_tag=
          image_ref=
          should_manage_labels=false
          should_remove_run_label=false

          case "${EVENT_NAME}" in
            push)
              if [ "${REF}" = "refs/heads/main" ]; then
                run_scans=true
                image_tag="main-${SHA}"
                image_ref="${GHCR_IMAGE}:${image_tag}"
              fi
              ;;
            pull_request)
              if [ "${PR_LABEL:-}" = "security/run" ]; then
                run_scans=true
                is_pr_mode=true
                pr_number="${PR_NUMBER:-}"
                image_tag="dev-${SHA}"
                image_ref="${GHCR_IMAGE}:${image_tag}"
                should_manage_labels=true
                should_remove_run_label=true
              fi
              ;;
            workflow_dispatch)
              run_scans=true
              image_tag="${INPUT_IMAGE_TAG}"
              image_ref="${GHCR_IMAGE}:${image_tag}"
              ;;
            *)
              echo "::error::Unsupported event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          {
            echo "run_scans=${run_scans}"
            echo "is_pr_mode=${is_pr_mode}"
            echo "pr_number=${pr_number}"
            echo "image_tag=${image_tag}"
            echo "image_ref=${image_ref}"
            echo "should_manage_labels=${should_manage_labels}"
            echo "should_remove_run_label=${should_remove_run_label}"
          } >> "$GITHUB_OUTPUT"

  prepare:
    name: "Prepare: comment and remove trigger labels"
    needs:
      - context
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post workflow run comment
        if: needs.context.outputs.is_pr_mode == 'true'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `Security workflow has been started.\n\nWorkflow run: ${runUrl}`,
            });

      - name: Remove security/run label
        if: needs.context.outputs.should_remove_run_label == 'true'
        uses: mondeja/remove-labels-gh-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: security/run

  golang-code-scan:
    name: "Golang: code scan"
    runs-on: ubuntu-latest
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go mod download
        run: go mod download

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  golang-deps-scan:
    name: "Golang: deps scan"
    needs:
      - context
      - golang-code-scan
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Go dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --skip-dirs docs .

  docs-deps-scan:
    name: "Docs: deps scan"
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on docs dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 docs

  helm-scan:
    name: "Helm: template scan"
    runs-on: ubuntu-latest
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    strategy:
      matrix:
        chart:
          - ipfs-cluster
          - csi-driver-ipfs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Helm charts - ${{ matrix.chart }}
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/${{ matrix.chart }}"

  kubernetes-manifests-scan:
    name: "K8S: manifests scan"
    needs:
      - context
      - helm-scan
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - ipfs-cluster
          - csi-driver-ipfs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on rendered Kubernetes manifests - ${{ matrix.chart }}
        run: |
          set -euo pipefail
          mkdir -p charts/dist
          helm dependency update "charts/${{ matrix.chart }}"
          helm template "${{ matrix.chart }}" "charts/${{ matrix.chart }}" > "charts/dist/${{ matrix.chart }}-rendered.yaml"
          trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/dist/${{ matrix.chart }}-rendered.yaml"

  dockerfile-scan:
    name: "Docker: dockerfile scan"
    runs-on: ubuntu-latest
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Dockerfile
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 Dockerfile

  wait-image:
    name: "Docker: wait image"
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 32
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CSI driver image on GHCR
        env:
          IMAGE_REF: ${{ needs.context.outputs.image_ref }}
        run: |
          set -euo pipefail
          image="${IMAGE_REF}"
          timeout_secs=1800
          start_ts=$(date +%s)

          while true; do
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              elapsed=$(( $(date +%s) - start_ts ))
              echo "OK: manifest present — ${image} (after ${elapsed}s)"
              exit 0
            fi

            elapsed=$(( $(date +%s) - start_ts ))
            if (( elapsed >= timeout_secs )); then
              break
            fi

            echo "Image not ready yet (${elapsed}s / ${timeout_secs}s), retry in 10s..."
            sleep 10
          done

          if docker manifest inspect "$image" >/dev/null 2>&1; then
            elapsed=$(( $(date +%s) - start_ts ))
            echo "OK: manifest present — ${image} (after ${elapsed}s)"
            exit 0
          fi

          echo "::error title=Image missing::No manifest for ${image} within 30 minutes."
          exit 1

  docker-image-scan:
    name: "Docker: image scan"
    needs:
      - context
      - dockerfile-scan
      - wait-image
    if: needs.context.outputs.run_scans == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Scan Docker image
        run: |
          trivy image --quiet --severity "${{ env.TRIVY_SEVERITY }}" --ignorefile .trivyignore.image.yaml --exit-code 1 "${{ needs.context.outputs.image_ref }}"

  shell-scripts-scan:
    name: "Shell: scripts scan"
    runs-on: ubuntu-latest
    needs:
      - context
      - prepare
    if: needs.context.outputs.run_scans == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            echo "No tracked shell scripts found."
            exit 0
          fi
          shellcheck -x "${shell_scripts[@]}"

  security-label-result:
    name: "Finalize: add result labels"
    needs:
      - context
      - prepare
      - golang-code-scan
      - golang-deps-scan
      - docs-deps-scan
      - helm-scan
      - kubernetes-manifests-scan
      - dockerfile-scan
      - wait-image
      - docker-image-scan
      - shell-scripts-scan
    if: ${{ always() && needs.context.outputs.should_manage_labels == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Apply security/success (remove security/fail)
        if: >-
          needs.prepare.result == 'success' &&
          needs.golang-code-scan.result == 'success' &&
          needs.golang-deps-scan.result == 'success' &&
          needs.docs-deps-scan.result == 'success' &&
          needs.helm-scan.result == 'success' &&
          needs.kubernetes-manifests-scan.result == 'success' &&
          needs.dockerfile-scan.result == 'success' &&
          needs.wait-image.result == 'success' &&
          needs.docker-image-scan.result == 'success' &&
          needs.shell-scripts-scan.result == 'success'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr,
                name: 'security/fail',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr,
              labels: ['security/success'],
            });

      - name: Apply security/fail (remove security/success)
        if: >-
          needs.prepare.result == 'failure' ||
          needs.prepare.result == 'cancelled' ||
          needs.golang-code-scan.result == 'failure' ||
          needs.golang-code-scan.result == 'cancelled' ||
          needs.golang-deps-scan.result == 'failure' ||
          needs.golang-deps-scan.result == 'cancelled' ||
          needs.docs-deps-scan.result == 'failure' ||
          needs.docs-deps-scan.result == 'cancelled' ||
          needs.helm-scan.result == 'failure' ||
          needs.helm-scan.result == 'cancelled' ||
          needs.kubernetes-manifests-scan.result == 'failure' ||
          needs.kubernetes-manifests-scan.result == 'cancelled' ||
          needs.dockerfile-scan.result == 'failure' ||
          needs.dockerfile-scan.result == 'cancelled' ||
          needs.wait-image.result == 'failure' ||
          needs.wait-image.result == 'cancelled' ||
          needs.docker-image-scan.result == 'failure' ||
          needs.docker-image-scan.result == 'cancelled' ||
          needs.shell-scripts-scan.result == 'failure' ||
          needs.shell-scripts-scan.result == 'cancelled'
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.context.outputs.pr_number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            if (!pr) {
              core.setFailed('No PR number available');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr,
                name: 'security/success',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr,
              labels: ['security/fail'],
            });

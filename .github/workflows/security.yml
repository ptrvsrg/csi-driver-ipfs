name: Security scans

on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "24.14.0"
  HELM_VERSION: v4.1.4
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_VERSION: v0.69.3

jobs:
  prepare:
    name: prepare
    if: ${{ github.event.label.name == 'security/run' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post workflow run comment
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request?.number;
            if (!pr) {
              core.setFailed('No pull_request in event payload');
              return;
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `Security workflow has been started.\n\nWorkflow run: ${runUrl}`,
            });

      - name: Remove security/run label
        uses: mondeja/remove-labels-gh-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: security/run

  golang-code-scan:
    name: golang-code-scan
    runs-on: ubuntu-latest
    needs:
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Go mod download
        run: go mod download

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated ./...

  golang-deps-scan:
    name: golang-deps-scan
    needs:
      - golang-code-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Go dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --skip-dirs docs .

  docs-deps-scan:
    name: docs-deps-scan
    needs:
      - prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on docs dependencies
        run: trivy fs --quiet --scanners vuln --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 docs

  helm-scan:
    name: helm-scan
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Helm charts - ${{ matrix.chart }}
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/${{ matrix.chart }}"

  kubernetes-manifests-scan:
    name: kubernetes-manifests-scan
    needs:
      - helm-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on rendered Kubernetes manifests - ${{ matrix.chart }}
        run: |
          set -euo pipefail
          mkdir -p charts/dist
          helm dependency update "charts/${{ matrix.chart }}"
          helm template "${{ matrix.chart }}" "charts/${{ matrix.chart }}" > "charts/dist/${{ matrix.chart }}-rendered.yaml"
          trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 --ignorefile "charts/${{ matrix.chart }}/.trivyignore" "charts/dist/${{ matrix.chart }}-rendered.yaml"

  dockerfile-scan:
    name: dockerfile-scan
    runs-on: ubuntu-latest
    needs:
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Run Trivy on Dockerfile
        run: trivy config --quiet --severity "${{ env.TRIVY_SEVERITY }}" --exit-code 1 Dockerfile

  wait-image:
    name: wait-image
    needs:
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 32
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CSI driver image on GHCR (up to 30 min, every 10s)
        run: |
          set -euo pipefail
          image='ghcr.io/ptrvsrg/csi-driver-ipfs:dev-${{ github.sha }}'
          timeout_secs=1800
          start_ts=$(date +%s)
          while true; do
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              elapsed=$(( $(date +%s) - start_ts ))
              echo "OK: manifest present — ${image} (after ${elapsed}s)"
              exit 0
            fi
            elapsed=$(( $(date +%s) - start_ts ))
            if (( elapsed >= timeout_secs )); then
              break
            fi
            echo "Image not ready yet (${elapsed}s / ${timeout_secs}s), retry in 10s…"
            sleep 10
          done
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            elapsed=$(( $(date +%s) - start_ts ))
            echo "OK: manifest present — ${image} (after ${elapsed}s)"
            exit 0
          fi
          echo "::error title=E2E image missing::No manifest for ${image} within 30 minutes. Run or wait for CI DEV (Go) docker-build-push for this PR merge SHA, then re-add the e2e label."
          exit 1

  docker-image-scan:
    name: docker-image-scan
    needs:
      - dockerfile-scan
      - wait-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: ${{ env.TRIVY_VERSION }}
          cache: true

      - name: Build and scan Docker image
        run: |
          trivy image --quiet --severity "${{ env.TRIVY_SEVERITY }}" --ignorefile .trivyignore.image.yaml --exit-code 1 "${IMAGE_NAME}:${IMAGE_TAG}"

  shell-scripts-scan:
    name: shell-scripts-scan
    runs-on: ubuntu-latest
    needs:
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            echo "No tracked shell scripts found."
            exit 0
          fi
          shellcheck -x "${shell_scripts[@]}"

  security-label-result:
    name: security-label-result
    needs:
      - prepare
      - golang-code-scan
      - golang-deps-scan
      - docs-deps-scan
      - helm-scan
      - kubernetes-manifests-scan
      - dockerfile-scan
      - wait-image
      - docker-image-scan
      - shell-scripts-scan
    runs-on: ubuntu-latest
    steps:
      - name: Apply security/success (remove security/fail)
        if: >-
          needs.prepare.result == 'success' &&
          needs.golang-code-scan.result == 'success' &&
          needs.golang-deps-scan.result == 'success' &&
          needs.docs-deps-scan.result == 'success' &&
          needs.helm-scan.result == 'success' &&
          needs.kubernetes-manifests-scan.result == 'success' &&
          needs.dockerfile-scan.result == 'success' &&
          needs.wait-image.result == 'success' &&
          needs.docker-image-scan.result == 'success' &&
          needs.shell-scripts-scan.result == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request?.number;
            if (!pr) {
              core.setFailed('No pull_request in event payload');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: pr, name: 'security/fail',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr, labels: ['security/success'],
            });
      - name: Apply security/fail (remove security/success)
        if: >-
          needs.prepare.result == 'failure' ||
          needs.prepare.result == 'cancelled' ||
          needs.golang-code-scan.result == 'failure' ||
          needs.golang-code-scan.result == 'cancelled' ||
          needs.golang-deps-scan.result == 'failure' ||
          needs.golang-deps-scan.result == 'cancelled' ||
          needs.docs-deps-scan.result == 'failure' ||
          needs.docs-deps-scan.result == 'cancelled' ||
          needs.helm-scan.result == 'failure' ||
          needs.helm-scan.result == 'cancelled' ||
          needs.kubernetes-manifests-scan.result == 'failure' ||
          needs.kubernetes-manifests-scan.result == 'cancelled' ||
          needs.dockerfile-scan.result == 'failure' ||
          needs.dockerfile-scan.result == 'cancelled' ||
          needs.wait-image.result == 'failure' ||
          needs.wait-image.result == 'cancelled' ||
          needs.docker-image-scan.result == 'failure' ||
          needs.docker-image-scan.result == 'cancelled'||
          needs.shell-scripts-scan.result == 'failure' ||
          needs.shell-scripts-scan.result == 'cancelled'
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request?.number;
            if (!pr) {
              core.setFailed('No pull_request in event payload');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: pr, name: 'security/success',
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pr, labels: ['security/fail'],
            });

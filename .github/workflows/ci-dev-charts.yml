name: CI DEV (Helm charts)

# Path filters: GitHub Actions glob patterns (minimatch), not regex.
# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - 'charts/**'
      - 'hack/ci/verify-chart-version-bump.sh'
      - '.github/workflows/ci-dev-charts.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_VERSION: v4.11.0
  HELM_UNITTEST_VERSION: "1.0.3"
  CHART_RELEASER_VERSION: "1.8.1"

jobs:
  chart-version:
    name: 'Helm: Chart.yaml version bump'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Verify chart version bump on chart changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./hack/ci/verify-chart-version-bump.sh

  lint:
    name: 'Helm: lint'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: "Helm: lint — ${{ matrix.chart }}"
        run: helm lint charts/${{ matrix.chart }}

  test:
    name: 'Helm: unittest'
    needs:
      - lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm and Unit test plugin
        uses: d3adb5/helm-unittest-action@v2
        with:
          helm-version: ${{ env.HELM_VERSION }}
          unittest-version: ${{ env.HELM_UNITTEST_VERSION }}
          charts: ${{ matrix.chart }}

  package:
    name: 'Helm: package (cr)'
    needs:
      - test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: "Helm: package - ${{ matrix.chart }}"
        uses: helm/chart-releaser-action@v1.7.0
        with:
          version: ${{ env.CHART_RELEASER_VERSION }}
          config: charts/cr.yaml
          charts_dir: charts/${{ matrix.chart }}
          skip_upload: true

      - name: Upload chart packages
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-dist
          path: charts/dist/*.tgz
          if-no-files-found: warn

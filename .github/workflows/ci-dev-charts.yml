name: CI DEV (Helm charts)

# Path filters: GitHub Actions glob patterns (minimatch), not regex.
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpull_request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - 'charts/**'
      - 'hack/ci/verify-chart-version-bump.sh'
      - '.github/workflows/ci-dev-charts.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HELM_VERSION: v4.1.4
  HELM_UNITTEST_VERSION: "1.0.3"
  CHART_RELEASER_VERSION: "1.8.1"

jobs:
  chart-version:
    name: 'Helm: Chart.yaml version bump'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Verify chart version bump on chart changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./hack/ci/verify-chart-version-bump.sh

  lint:
    name: 'Helm: lint'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Helm CLI (hosted tool cache)
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/helm
          key: ${{ runner.os }}-helm-cli-${{ runner.arch }}-${{ env.HELM_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: "Helm: lint — ${{ matrix.chart }}"
        run: helm lint charts/${{ matrix.chart }}

  test:
    name: 'Helm: unittest'
    needs:
      - lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Helm CLI + helm-unittest plugin
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.tool_cache }}/helm
            ~/.local/share/helm/plugins
          key: ${{ runner.os }}-helm-ut-${{ runner.arch }}-${{ env.HELM_VERSION }}-${{ env.HELM_UNITTEST_VERSION }}

      # d3adb5/helm-unittest-action installs the plugin without --verify=false, which Helm 4 rejects.
      # It also passes --color to helm unittest, which breaks on Helm 4 (flag parsing).
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install helm-unittest
        run: |
          set -euo pipefail
          if helm plugin list | sed '1d' | awk '{print $1}' | grep -q '^unittest$'; then
            echo "helm-unittest already present"
          else
            helm plugin install https://github.com/helm-unittest/helm-unittest \
              --version "${{ env.HELM_UNITTEST_VERSION }}" \
              --verify=false
          fi

      - name: Helm dependency update
        run: helm dependency update "charts/${{ matrix.chart }}"

      - name: Run helm unittest
        run: helm unittest "charts/${{ matrix.chart }}"

  package:
    name: 'Helm: package (cr)'
    needs:
      - test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - "ipfs-cluster"
          - "csi-driver-ipfs"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Helm CLI (hosted tool cache)
        uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/helm
          key: ${{ runner.os }}-helm-cli-${{ runner.arch }}-${{ env.HELM_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: "Helm: package - ${{ matrix.chart }}"
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: ${{ env.CHART_RELEASER_VERSION }}
          config: charts/cr.yaml
          charts_dir: charts/${{ matrix.chart }}
          skip_upload: true

      - name: Upload chart packages
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts-dist
          path: charts/dist/*.tgz
          if-no-files-found: warn

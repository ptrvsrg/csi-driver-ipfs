name: Publish Pages (docs + charts)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "20"
  HELM_VERSION: v4.11.0

jobs:
  docs-build:
    name: "Docs: docusaurus build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: docs/yarn.lock

      - name: Build docs
        run: |
          yarn --cwd docs install --frozen-lockfile
          yarn --cwd docs run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs/build
          if-no-files-found: error

  charts-build:
    name: "Charts: package and index"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package charts and generate index
        env:
          CHART_REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/charts
        run: |
          mkdir -p .charts-out/charts
          helm package charts/csi-driver-ipfs --destination .charts-out/charts
          helm package charts/ipfs-cluster --destination .charts-out/charts
          helm repo index .charts-out/charts --url "${CHART_REPO_URL}"

      - name: Upload charts artifact
        uses: actions/upload-artifact@v4
        with:
          name: charts-repo
          path: .charts-out/charts
          if-no-files-found: error

  pages-assemble:
    name: "Pages: assemble site"
    runs-on: ubuntu-latest
    needs:
      - docs-build
      - charts-build
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: .pages

      - name: Download charts artifact
        uses: actions/download-artifact@v4
        with:
          name: charts-repo
          path: .pages/charts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  pages-deploy:
    name: "Pages: deploy"
    runs-on: ubuntu-latest
    needs:
      - pages-assemble
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release (Helm charts)

on:
  push:
    tags:
      - 'chart/csi-driver-ipfs/v*'
      - 'chart/ipfs-cluster/v*'

permissions:
  contents: write

env:
  HELM_VERSION: v3.16.0
  CR_VERSION: "1.8.1"

jobs:
  verify-version:
    name: 'Chart release: verify tag vs Chart.yaml'
    runs-on: ubuntu-latest
    outputs:
      chart: ${{ steps.meta.outputs.chart }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up yq
        uses: chrisdickinson/setup-yq@latest

      - name: Verify tag matches Chart.yaml version
        run: |
          export GITHUB_REF="$GITHUB_REF"
          export REPO_ROOT="$GITHUB_WORKSPACE"
          bash hack/ci/verify-chart-release-tag.sh

      - name: Parse chart name from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            chart/csi-driver-ipfs/v*) echo "chart=csi-driver-ipfs" >> "$GITHUB_OUTPUT" ;;
            chart/ipfs-cluster/v*) echo "chart=ipfs-cluster" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected tag: $TAG" >&2; exit 1 ;;
          esac

  publish:
    name: 'Chart release: package, upload'
    needs:
      - verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: "Helm: package and upload - ${{ needs.verify-version.outputs.chart }}"
        uses: helm/chart-releaser-action@v1.7.0
        with:
          version: ${{ env.CR_VERSION }}
          config: charts/cr.yaml
          charts_dir: charts/${{ needs.verify-version.outputs.chart }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

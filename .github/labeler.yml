# Labeler config for actions/labeler
# https://github.com/actions/labeler
# Labels are applied to PRs based on changed files.

driver:
  - pkg/driver/**/*

ipfs:
  - pkg/ipfs/**/*

kubernetes:
  - pkg/kubernetes/**/*

helm:
  - charts/**/*

ci:
  - .github/**/*
  - hack/**/*
  - Makefile
  - .editorconfig
  - .golangci.yaml
  - .goreleaser.yaml
  - .markdownlint.json
  - .markdownlint-cli2.jsonc
  - .mockery.yaml

markdown:
  - "**/*.md"

dependencies:
  - "go.mod"
  - "go.sum"
  - "package.json"
  - "package-lock.json"
  - "yarn.lock"

golang:
  - "**/*.go"

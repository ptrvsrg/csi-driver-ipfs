# Labeler config for actions/labeler v5+
# https://github.com/actions/labeler
# Labels are applied to PRs based on changed files (match object syntax).

scope/driver:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/driver/**/*

scope/ipfs:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/ipfs/**/*

scope/kubernetes:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/kubernetes/**/*

scope/helm:
  - changed-files:
      - any-glob-to-any-file:
          - charts/**/*

scope/ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
          - hack/**/*
          - Makefile
          - .editorconfig
          - .golangci.yaml
          - .goreleaser.yaml
          - .markdownlint.json
          - .markdownlint-cli2.jsonc
          - .mockery.yaml

scope/markdown:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"

scope/deps:
  - changed-files:
      - any-glob-to-any-file:
          - go.mod
          - go.sum
          - package.json
          - package-lock.json
          - yarn.lock

scope/golang:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.go"
